name: Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 배지 커밋(contents), PR 코멘트(pull-requests), Pages 배포(pages/id-token)
permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test + Jacoco 리포트 생성 (server + batch)
        run: ./gradlew test jacocoTestReport

      # (A) PR 코멘트 — 전체 + 변경 파일별 커버리지 (PR 일 때만)
      # min-coverage 는 지금 0 (알림용). 프로젝트 커버리지가 오르면 80 으로 올려 게이트로 사용.
      - name: 커버리지 PR 코멘트
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: >-
            ${{ github.workspace }}/server/build/reports/jacoco/test/jacocoTestReport.xml,
            ${{ github.workspace }}/batch/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0
          title: "🧪 테스트 커버리지 리포트"

      # (B) HTML 리포트 아티팩트 — 항상. Actions 실행 페이지에서 받아 패키지별 열람
      - name: HTML 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-reports
          path: |
            server/build/reports/jacoco/test/html
            batch/build/reports/jacoco/test/html

      # 배지 생성 (main push 일 때만) — server / batch / 전체(합산) 3종
      - name: 배지 생성 (server)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: server/build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .github/badges
          coverage-badge-filename: jacoco-server.svg
          generate-coverage-badge: true
          generate-branches-badge: false

      - name: 배지 생성 (batch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: batch/build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .github/badges
          coverage-badge-filename: jacoco-batch.svg
          generate-coverage-badge: true
          generate-branches-badge: false

      - name: 배지 생성 (전체 = server + batch 합산)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: >-
            server/build/reports/jacoco/test/jacocoTestReport.csv
            batch/build/reports/jacoco/test/jacocoTestReport.csv
          badges-directory: .github/badges
          coverage-badge-filename: jacoco.svg
          generate-coverage-badge: true
          generate-branches-badge: true

      - name: 배지 커밋
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/*.svg
          git diff --staged --quiet || git commit -m "chore: 커버리지 배지 갱신 [skip ci]"
          git push

      # (C) GitHub Pages — main push 일 때 HTML 리포트를 gh-pages 로 배포
      - name: Pages 산출물 준비
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p public/server public/batch
          cp -r server/build/reports/jacoco/test/html/* public/server/ 2>/dev/null || true
          cp -r batch/build/reports/jacoco/test/html/* public/batch/ 2>/dev/null || true
          echo '<h1>MoNew 커버리지 리포트</h1><ul><li><a href="server/">server</a></li><li><a href="batch/">batch</a></li></ul>' > public/index.html

      - name: gh-pages 배포
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
