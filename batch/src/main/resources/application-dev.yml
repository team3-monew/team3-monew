# 로컬 개발용 — docker-compose.yml 의 postgres/mongo 와 연결
server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/monew
    username: monew_user
    password: monew1234
    driver-class-name: org.postgresql.Driver

  data:
    mongodb:
      uri: mongodb://localhost:27017/monew

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  batch:
    jdbc:
      # 배치 메타데이터 테이블 자동 생성 (로컬)
      initialize-schema: always

logging:
  level:
    root: info
    com.monew: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

