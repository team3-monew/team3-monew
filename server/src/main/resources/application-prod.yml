# 운영용 — 값은 환경변수로 주입 (ECS Task Definition 등)
server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    mongodb:
      uri: ${MONGODB_URI}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: info
    com.monew: info
    org.hibernate.SQL: warn

# 운영에서는 헬스 상세 노출을 제한 (정보 노출 방지)
management:
  endpoint:
    health:
      # ALB 헬스체크 전용 그룹 — Mongo(활동내역 전용)를 빼서 Atlas 순단이 전체 다운으로 번지지 않게 함
      # 배포 후 타깃그룹 경로를 /actuator/health/alb 로 전환해야 적용됨
      group:
        alb:
          include: ping, db
      show-details: when-authorized

backup:
  storage:
    type: ${BACKUP_STORAGE_TYPE:s3}
    local:
      root-path: ${BACKUP_LOCAL_ROOT_PATH:.monew/backups}
    s3:
      bucket: ${BACKUP_S3_BUCKET}
      prefix: ${BACKUP_S3_PREFIX:backups/articles}
      region: ${AWS_REGION:ap-northeast-2}
