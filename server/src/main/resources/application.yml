spring:
  application:
    name: monew-server

  profiles:
    active: dev

  datasource:
    hikari:
      # DB 세션 시간대를 KST로 고정 — comment_likes/article_views insert(native)와
      # articles.updated_at 갱신이 DB의 CURRENT_TIMESTAMP를 쓰므로 JVM(TZ=Asia/Seoul)과 맞춰야 함.
      # DB 서버 설정(RDS 파라미터그룹/ALTER DATABASE) 없이 커넥션 단에서 통일된다.
      connection-init-sql: SET TIME ZONE 'Asia/Seoul'
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: 1

logging:
  level:
    root: info
  pattern:
    # [requestId][clientIp] 를 모든 로그에 출력 (요청 밖이면 빈 값)
    console: "%d{HH:mm:ss.SSS} [%X{requestId:-}] [%X{clientIp:-}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers

  endpoint:
    health:
      show-details: always
